# Export SBOM from GitHub dependency graph.
# - On release: attach SBOM as a release asset (no PR needed).
# - Manual run: upload SBOM as a workflow artifact for download; commit to sboms/ yourself if desired.
# API: https://docs.github.com/en/rest/dependency-graph/sbom
name: Export SBOM
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write   # upload release asset

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch SBOM from dependency graph
        id: fetch
        run: |
          REPO="${{ github.repository }}"
          OWNER="${REPO%/*}"
          REPO_NAME="${REPO#*/}"
          mkdir -p sboms
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            FILENAME="sboms/${OWNER}_${REPO_NAME}_${TAG}.json"
          else
            SHA="${{ github.sha }}"
            SHORT_SHA="${SHA::7}"
            FILENAME="sboms/${OWNER}_${REPO_NAME}_${SHORT_SHA}.json"
          fi
          curl -sSfL -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${REPO}/dependency-graph/sbom" \
            -o "${FILENAME}"
          echo "file=${FILENAME}" >> $GITHUB_OUTPUT
          echo "branch=chore/sbom-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Exported SBOM to ${FILENAME}"

      - name: Upload SBOM to release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPLOAD_URL="${{ github.event.release.upload_url }}"
          NAME="sbom-${{ github.event.release.tag_name }}.json"
          curl -sSfL -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @"${{ steps.fetch.outputs.file }}" \
            "${UPLOAD_URL%%\{*}?name=${NAME}"

      - name: Upload SBOM as artifact (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: ${{ steps.fetch.outputs.file }}
