# Export SBOM from GitHub dependency graph and open a PR to update sboms/
# Runs after push to main. Creates a branch and PR instead of pushing directly,
# so branch protection (e.g. "require pull request") is satisfied.
# API: https://docs.github.com/en/rest/dependency-graph/sbom
name: Export SBOM
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch SBOM from dependency graph
        id: fetch
        run: |
          REPO="${{ github.repository }}"
          OWNER="${REPO%/*}"
          REPO_NAME="${REPO#*/}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA::7}"
          FILENAME="sboms/${OWNER}_${REPO_NAME}_${SHORT_SHA}.json"
          mkdir -p sboms
          curl -sSfL -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${REPO}/dependency-graph/sbom" \
            -o "${FILENAME}"
          echo "file=${FILENAME}" >> $GITHUB_OUTPUT
          echo "branch=chore/sbom-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Exported SBOM to ${FILENAME}"

      - name: Create branch and open PR if SBOM changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BRANCH="chore/sbom-${SHORT_SHA}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add sboms/
          if git diff --staged --quiet; then
            echo "No SBOM changes; skipping PR"
            exit 0
          fi
          git commit -m "chore: update SBOM from dependency graph [skip ci]"
          git push -u origin "${BRANCH}"
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore: update SBOM from dependency graph" \
            --body "Auto-generated SBOM export after merge to main. Safe to merge."
          gh pr merge "${BRANCH}" --auto --squash