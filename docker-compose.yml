# Discovery App — run backend API, frontend, Postgres, and MinIO.
# From repo root: docker compose up --build
# Frontend: http://localhost:5173  |  Backend: http://localhost:8000  |  MinIO console: http://localhost:9001
# Copy backend/.env.example to backend/.env and set SECRET_KEY, CLAUDE_API_KEY, etc.

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: discovery_app
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    # No healthcheck: minio image has no curl/mc. Backend tolerates MinIO being slow to start.

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/discovery_app
      STORAGE_ENDPOINT_URL: http://minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET_NAME: discovery-files
      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: discovery-app
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    # Browser uses VITE_API_URL or default http://localhost:8000; backend is on host port 8000.

  # One-off: run migrations (optional; backend entrypoint already runs migrations)
  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: "no"
    depends_on:
      db: { condition: service_healthy }
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/discovery_app
    command: ["alembic", "upgrade", "head"]
    profiles:
      - tools

volumes:
  db-data:
  minio-data:
