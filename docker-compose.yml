version: '3.8'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: discovery_app
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/discovery_app
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: "no"
    depends_on:
      - db
    env_file:
      - backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/discovery_app
    command: ["alembic", "upgrade", "head"]
    volumes:
      - ./backend:/app

volumes:
  db-data:
