application:
  name: fine-peak-discovery_assistant
  pods:
    - name: backend
      image: "# filled by pipeline:backend"
      path: /api
      servicePorts:
        - 8000
      vars:
        ACCESS_TOKEN_EXPIRE_MINUTES: "60"
        DATABASE_HOST: "db"
        DATABASE_PORT: "5432"
        DATABASE_URL: "postgresql://app:secret@${postgres:5432}/app"
        POSTGRES_DB: "discovery_app"
        POSTGRES_PASSWORD: "postgres"
        POSTGRES_USER: "postgres"
        SECRET_KEY: "replace-this-with-a-secure-random-string"
        SMTP_HOST: "localhost"
        SMTP_PASSWORD: ""
        SMTP_PORT: "1025"
        SMTP_USER: ""
    - name: frontend
      image: "# filled by pipeline:frontend"
      path: /
      servicePorts:
        - 3000
      vars:
        API_URL: "http://${backend:8000}"
        NEXT_PUBLIC_API_URL: "http://${backend:8000}"
        VITE_API_URL: "http://${backend:8000}"
    - name: postgres
      image: mirror.gcr.io/library/postgres:16-alpine
      servicePorts:
        - 5432
      vars:
        POSTGRES_DB: "app"
        POSTGRES_PASSWORD: "secret"
        POSTGRES_USER: "app"
